services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: liuguang-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: liuguang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liuguang-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # 容器内连接数据库用服务名，覆盖 .env 中的 localhost
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/liuguang
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 构建时注入前端环境变量（Vite 在构建时静态替换）
        VITE_FEISHU_APP_ID: ${VITE_FEISHU_APP_ID:-}
        VITE_FEISHU_REDIRECT_URI: ${VITE_FEISHU_REDIRECT_URI:-}
    container_name: liuguang-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
