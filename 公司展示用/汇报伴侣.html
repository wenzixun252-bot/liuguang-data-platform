<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流光·办公副驾 | 汇报伴侣</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #e0e7ff;
    --accent: #7c3aed;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--gray-900);
    color: var(--gray-100);
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Top Bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--gray-800);
    border-bottom: 1px solid var(--gray-700);
    height: 56px;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .progress-section {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--gray-400);
  }

  .step-dots {
    display: flex;
    gap: 4px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-600);
    cursor: pointer;
    transition: all 0.2s;
  }

  .step-dot.active { background: var(--primary); transform: scale(1.3); }
  .step-dot.done { background: var(--success); }

  .timer-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .timer {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    color: var(--gray-100);
  }

  .timer.warning { color: var(--warning); }
  .timer.danger { color: var(--danger); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .timer-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--gray-600);
    background: transparent;
    color: var(--gray-300);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-btn:hover { background: var(--gray-700); border-color: var(--gray-500); }
  .timer-btn.running { border-color: var(--success); color: var(--success); }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    height: calc(100vh - 56px);
  }

  /* Left Panel - Current Section */
  .left-panel {
    padding: 32px 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-number {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .section-meta {
    flex: 1;
  }

  .section-title {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }

  .section-subtitle {
    font-size: 14px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  .section-time-badge {
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--gray-700);
    font-size: 13px;
    color: var(--gray-300);
    white-space: nowrap;
  }

  /* Talking Points */
  .talk-card {
    background: var(--gray-800);
    border: 1px solid var(--gray-700);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .talk-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .talk-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .talk-point {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 16px;
    line-height: 1.6;
    color: var(--gray-200);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .talk-point:hover { background: var(--gray-700); }
  .talk-point.spoken { opacity: 0.35; }

  .talk-point .bullet {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--gray-500);
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
  }

  .talk-point.spoken .bullet {
    background: var(--success);
    border-color: var(--success);
  }

  .talk-point .bullet::after {
    content: '';
  }

  .talk-point.spoken .bullet::after {
    content: '\2713';
    color: #fff;
    font-weight: 700;
  }

  .highlight {
    background: rgba(79, 70, 229, 0.2);
    color: #a5b4fc;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .keyword {
    color: #fbbf24;
    font-weight: 600;
  }

  /* Script Box */
  .script-box {
    background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(124, 58, 237, 0.1));
    border: 1px solid rgba(79, 70, 229, 0.3);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .script-box-title {
    font-size: 13px;
    font-weight: 600;
    color: #818cf8;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .script-text {
    font-size: 17px;
    line-height: 1.8;
    color: var(--gray-200);
    font-style: italic;
  }

  /* Transition Box */
  .transition-box {
    background: rgba(5, 150, 105, 0.1);
    border: 1px solid rgba(5, 150, 105, 0.3);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .transition-arrow {
    font-size: 20px;
    color: var(--success);
  }

  .transition-text {
    font-size: 15px;
    color: #6ee7b7;
    line-height: 1.5;
  }

  /* Right Panel */
  .right-panel {
    background: var(--gray-800);
    border-left: 1px solid var(--gray-700);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .right-card {
    background: var(--gray-900);
    border: 1px solid var(--gray-700);
    border-radius: 10px;
    padding: 16px;
  }

  .right-card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Data Cards */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .data-item {
    background: var(--gray-800);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }

  .data-value {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
  }

  .data-value.accent { color: #818cf8; }
  .data-value.green { color: #34d399; }
  .data-value.yellow { color: #fbbf24; }

  .data-label {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  /* QA List */
  .qa-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .qa-item {
    padding: 10px 12px;
    background: var(--gray-800);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .qa-item:hover { background: var(--gray-700); }

  .qa-question {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-200);
    margin-bottom: 4px;
  }

  .qa-answer {
    font-size: 12px;
    color: var(--gray-400);
    line-height: 1.5;
    display: none;
  }

  .qa-item.open .qa-answer { display: block; }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    padding-top: 8px;
    margin-top: auto;
  }

  .nav-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--gray-600);
    background: var(--gray-800);
    color: var(--gray-200);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .nav-btn:hover { background: var(--gray-700); }

  .nav-btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .nav-btn.primary:hover { background: #4338ca; }

  /* Keyboard hints */
  .kb-hints {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 8px;
    font-size: 11px;
    color: var(--gray-500);
  }

  kbd {
    padding: 2px 6px;
    background: var(--gray-700);
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    color: var(--gray-300);
  }

  /* Outline in right panel */
  .outline-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .outline-item {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--gray-400);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .outline-item:hover { background: var(--gray-800); color: var(--gray-200); }
  .outline-item.active { background: rgba(79,70,229,0.15); color: #a5b4fc; font-weight: 600; }
  .outline-item.done { color: var(--gray-500); }
  .outline-item .o-num {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    background: var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .outline-item.active .o-num { background: var(--primary); color: #fff; }
  .outline-item.done .o-num { background: var(--success); color: #fff; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-left">

      <span id="progressText">1 / 9</span>
    </div>
  </div>
  <div class="timer-section">
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">Start</button>
    <div class="timer" id="timerDisplay">00:00</div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="left-panel" id="leftPanel"></div>
  <div class="right-panel" id="rightPanel"></div>
</div>

// ============ STATE ============
let currentIdx = 0;
let timerRunning = false;
let timerSeconds = 0;
let timerInterval = null;
let spokenPoints = {};

// ============ RENDER ============
function render() {
  const s = sections[currentIdx];

  // Step dots
  const dotsHtml = sections.map((_, i) => {
    let cls = 'step-dot';
    if (i === currentIdx) cls += ' active';
    else if (i < currentIdx) cls += ' done';
    return `<div class="${cls}" onclick="goTo(${i})"></div>`;
  }).join('');
  document.getElementById('stepDots').innerHTML = dotsHtml;
  document.getElementById('progressText').textContent = `${currentIdx + 1} / ${sections.length}`;

  // Left panel
  let leftHtml = '';

  // Section header
  leftHtml += `
    <div class="section-header">
      <div class="section-number">${s.num}</div>
      <div class="section-meta">
        <div class="section-title">${s.title}</div>
        <div class="section-subtitle">${s.subtitle}</div>
      </div>
      <div class="section-time-badge">${s.time}</div>
    </div>
  `;

  // Script
  if (s.script) {
    leftHtml += `
      <div class="script-box">
        <div class="script-box-title">OPENING SCRIPT</div>
        <div class="script-text">\u201c${s.script}\u201d</div>
      </div>
    `;
  }

  // Talking points
  if (s.points.length > 0) {
    const key = currentIdx;
    if (!spokenPoints[key]) spokenPoints[key] = {};
    const pointsHtml = s.points.map((p, i) => {
      const spoken = spokenPoints[key][i] ? 'spoken' : '';
      return `<li class="talk-point ${spoken}" onclick="toggleSpoken(${key},${i})">
        <div class="bullet"></div>
        <div>${p}</div>
      </li>`;
    }).join('');
    leftHtml += `
      <div class="talk-card">
        <div class="talk-card-title">TALKING POINTS</div>
        <ul class="talk-points">${pointsHtml}</ul>
      </div>
    `;
  }

  // Transition
  if (s.transition) {
    leftHtml += `
      <div class="transition-box">
        <div class="transition-arrow">\u2192</div>
        <div class="transition-text"><strong>过渡到下一节\uff1a</strong>${s.transition}</div>
      </div>
    `;
  }

  // Nav
  leftHtml += `
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${currentIdx === 0 ? 'disabled style="opacity:0.3;cursor:default"' : ''}>\u2190 \u4e0a\u4e00\u6b65</button>
      <button class="nav-btn primary" onclick="next()" ${currentIdx === sections.length - 1 ? 'disabled style="opacity:0.3;cursor:default"' : ''}>\u4e0b\u4e00\u6b65 \u2192</button>
    </div>
    <div class="kb-hints">
      <span><kbd>\u2190</kbd> <kbd>\u2192</kbd> \u7ffb\u9875</span>
      <span><kbd>Space</kbd> \u8ba1\u65f6</span>
      <span><kbd>R</kbd> \u91cd\u7f6e\u8ba1\u65f6</span>
    </div>
  `;

  document.getElementById('leftPanel').innerHTML = leftHtml;

  // Right panel
  let rightHtml = '';

  // Outline
  rightHtml += `<div class="right-card">
    <div class="right-card-title">\u{1F4CB} \u6c47\u62a5\u5927\u7eb2</div>
    <div class="outline-list">
      ${sections.map((sec, i) => {
        let cls = 'outline-item';
        if (i === currentIdx) cls += ' active';
        else if (i < currentIdx) cls += ' done';
        return `<div class="${cls}" onclick="goTo(${i})">
          <div class="o-num">${i < currentIdx ? '\u2713' : sec.num}</div>
          <span>${sec.title}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Key data (always visible)
  rightHtml += `<div class="right-card">
    <div class="right-card-title">\u{1F4CA} \u6838\u5fc3\u6570\u636e\uff08\u968f\u65f6\u53ef\u5f15\u7528\uff09</div>
    <div class="data-grid">
      <div class="data-item"><div class="data-value accent">9,250</div><div class="data-label">\u5e74\u5316\u8282\u7701\u5de5\u65f6</div></div>
      <div class="data-item"><div class="data-value green">92.5\u4e07</div><div class="data-label">\u5e74\u5316\u8282\u7701\u91d1\u989d</div></div>
      <div class="data-item"><div class="data-value yellow">60%</div><div class="data-label">\u68c0\u7d22\u6548\u7387\u63d0\u5347</div></div>
      <div class="data-item"><div class="data-value accent">6\u6b65</div><div class="data-label">ETL\u6d41\u6c34\u7ebf</div></div>
      <div class="data-item"><div class="data-value green">4\u79cd</div><div class="data-label">\u884c\u4e1a\u63d0\u53d6\u6a21\u677f</div></div>
      <div class="data-item"><div class="data-value yellow">8\u79cd</div><div class="data-label">\u6e05\u6d17\u9009\u9879</div></div>
    </div>
  </div>`;

  // QA for current section
  if (s.qa.length > 0) {
    const qaHtml = s.qa.map((item, i) => `
      <div class="qa-item" onclick="this.classList.toggle('open')">
        <div class="qa-question">\u{1F4AC} ${item.q}</div>
        <div class="qa-answer">${item.a}</div>
      </div>
    `).join('');
    rightHtml += `<div class="right-card">
      <div class="right-card-title">\u26A1 \u53ef\u80fd\u88ab\u8ffd\u95ee</div>
      <div class="qa-list">${qaHtml}</div>
    </div>`;
  }

  document.getElementById('rightPanel').innerHTML = rightHtml;
}

function toggleSpoken(section, point) {
  if (!spokenPoints[section]) spokenPoints[section] = {};
  spokenPoints[section][point] = !spokenPoints[section][point];
  render();
}

function goTo(idx) {
  currentIdx = Math.max(0, Math.min(sections.length - 1, idx));
  render();
}

function next() { goTo(currentIdx + 1); }
function prev() { goTo(currentIdx - 1); }

// Timer
function toggleTimer() {
  timerRunning = !timerRunning;
  const btn = document.getElementById('timerBtn');
  if (timerRunning) {
    btn.textContent = 'Pause';
    btn.classList.add('running');
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
    }, 1000);
  } else {
    btn.textContent = 'Resume';
    btn.classList.remove('running');
    clearInterval(timerInterval);
  }
}

function resetTimer() {
  timerRunning = false;
  timerSeconds = 0;
  clearInterval(timerInterval);
  document.getElementById('timerBtn').textContent = 'Start';
  document.getElementById('timerBtn').classList.remove('running');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
  const s = String(timerSeconds % 60).padStart(2, '0');
  const el = document.getElementById('timerDisplay');
  el.textContent = `${m}:${s}`;
  el.classList.remove('warning', 'danger');
  if (timerSeconds >= 20 * 60) el.classList.add('danger');
  else if (timerSeconds >= 15 * 60) el.classList.add('warning');
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  if (e.key === ' ') { e.preventDefault(); toggleTimer(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); resetTimer(); }
});

// Init
render();
</script>
